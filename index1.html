<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://kit.fontawesome.com/d42cfb6433.js" crossorigin="anonymous"></script>
	<link rel="stylesheet" type="text/css" href="css/main.css">
	<link rel="stylesheet" type="text/css" href="css/responsive.css">
    <link rel="icon" type="image/png" href="img/">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>это чт</title>
</head>
<body>
    <div class="container">
        <input type="radio" name="slider" id="item-1" checked>
        <input type="radio" name="slider" id="item-2">
        <input type="radio" name="slider" id="item-3">
      <div class="cards">
        <label class="card" for="item-1" id="song-1">
          <img src="img\us.jpg" alt="song">
        </label>
        <label class="card" for="item-2" id="song-2">
          <img src="img\us2.jpg" alt="song">
        </label>
        <label class="card" for="item-3" id="song-3">
          <img src="img\us3.jpg" alt="song">
        </label>
      </div>
      <div class="player">
        <div class="upper-part">
          <div class="play-icon">
            <svg width="20" height="20" fill="#2992dc" stroke="#2992dc" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" class="feather feather-play" viewBox="0 0 24 24">
              <defs/>
              <path d="M5 3l14 9-14 9V3z"/>
            </svg>
          </div>
          <div class="info-area" id="test">
            <label class="song-info" id="song-info-1">
              <div class="title">Dynamite</div>
              <div class="sub-line">
                <div class="subtitle">BTS</div>
                <div class="time">4.05</div>
              </div>
            </label>
            <label class="song-info" id="song-info-2">
              <div class="title">Look after you</div>
              <div class="sub-line">
                <div class="subtitle">The Fray</div>
                <div class="time">4.05</div>
              </div>
            </label>
            <label class="song-info" id="song-info-3">
              <div class="title">Run</div>
              <div class="sub-line">
                <div class="subtitle">Daughter</div>
                <div class="time">4.05</div>
              </div>
            </label>
          </div>
        </div>
        <div class="progress-bar">
          <span class="progress"></span>
        </div>
      </div>
    </div>
</body>
